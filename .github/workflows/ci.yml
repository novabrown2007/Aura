name: Aura CLI CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Try build compile suite
        run: python run_tests.py --suite build -v 2

      - name: Try Python bytecode build
        run: python -m compileall .

  test-suites:
    name: Test - ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        suite:
          - runtime_smoke
          - logger
          - datetime_utils
          - notifications
          - system
          - cli_interface
          - short_memory
          - long_memory
          - calendar
          - llm
          - reminders
          - mysql_integration

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run suite
        run: python run_tests.py --suite ${{ matrix.suite }} -v 2
