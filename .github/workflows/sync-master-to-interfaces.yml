name: Sync Master To Interface Branches

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-sync-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Create sync PRs from master
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_BRANCH="master"
          TARGET_BRANCHES=(
            "interface/CLI"
            "interface/windowsOS"
            "interface/chromeOS"
            "interface/androidOS"
            "interface/website"
          )

          for BASE in "${TARGET_BRANCHES[@]}"; do
            echo "Processing: $BASE"

            if ! gh api "repos/$REPO/branches/$BASE" > /dev/null 2>&1; then
              echo "Branch not found, skipping: $BASE"
              continue
            fi

            EXISTING_PR=$(gh pr list \
              --repo "$REPO" \
              --base "$BASE" \
              --head "$SOURCE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$EXISTING_PR" ]; then
              echo "Open PR already exists for $BASE: #$EXISTING_PR"
              continue
            fi

            gh pr create \
              --repo "$REPO" \
              --base "$BASE" \
              --head "$SOURCE_BRANCH" \
              --title "Sync master -> $BASE" \
              --body "Automated sync PR from master into $BASE."
          done
