name: Auto Approve And Auto Merge Sync PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - "aura/interface/windowsOS"
      - "aura/interface/macOS"
      - "aura/interface/linuxOS"
      - "aura/interface/chromeOS"
      - "aura/interface/androidOS"
      - "aura/interface/iOS"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-and-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Approve and enable auto-merge for sync PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No pull_request context (likely manual dispatch). Skipping."
            exit 0
          fi

          # Safety filters: only auto-handle PRs created to sync master.
          if [ "$PR_HEAD" != "master" ]; then
            echo "Head is not master ($PR_HEAD). Skipping."
            exit 0
          fi

          case "$PR_TITLE" in
            "Sync master -> "*) ;;
            *)
              echo "Title does not match sync pattern. Skipping."
              exit 0
              ;;
          esac

          echo "Approving PR #$PR_NUMBER"
          gh pr review "$PR_NUMBER" \
            --repo "$REPO" \
            --approve \
            --body "Auto-approved sync PR from master."

          echo "Enabling auto-merge for PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --merge \
            --delete-branch=false

